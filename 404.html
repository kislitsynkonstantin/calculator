<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Баня-МСК · Загрузка…</title>
<style>
  body { margin: 0; font-family: sans-serif; background: #0f1e20; color: #a8dde0; display: flex; align-items: center; justify-content: center; min-height: 100vh; flex-direction: column; gap: 16px; }
  .logo { font-size: 1.1rem; font-weight: 700; letter-spacing: 0.06em; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #2a8f97; animation: pulse 1.2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:0.3;transform:scale(0.8)} 50%{opacity:1;transform:scale(1)} }
</style>
<script>
  // Extract 6-digit code from URL path (e.g. /482916 or /482916/)
  (function() {
    var path = window.location.pathname.replace(/\//g, '');
    if (/^\d{6}$/.test(path)) {
      // Redirect to root with ?code= param
      window.location.replace('/?code=' + path);
    } else {
      // No code — just go home
      window.location.replace('/');
    }
  })();
</script>
</head>
<body>
  <div class="logo">БАНЯ-МСК</div>
  <div class="dot"></div>
</body>
</html>
